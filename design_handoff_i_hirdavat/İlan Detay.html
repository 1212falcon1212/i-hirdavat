<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>i-hirdavat — İlan Detay Tasarımı</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body { background: #E8EAF0; }
  .v-mobile-frame {
    width: 375px; height: 812px;
    background: black;
    border-radius: 38px;
    padding: 10px;
    margin: 0 auto;
    box-shadow: 0 20px 60px rgba(11,18,32,.18), 0 0 0 1px rgba(11,18,32,.06);
  }
  .v-mobile-frame > div {
    border-radius: 28px;
    overflow: hidden;
    height: 100%;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="v1.jsx"></script>
<script type="text/babel" src="v_mobile.jsx"></script>

<script type="text/babel">
const App = () => (
  <DesignCanvas projectName="i-hirdavat İlan Detay Sayfası" defaultZoom={0.55}>
    <DCSection id="desktop" title="Masaüstü">
      <DCArtboard id="v1" label="İlan Detay — Modernize Edilmiş Klasik" width={1280} height={2100}>
        <VariantV1 />
      </DCArtboard>
    </DCSection>
    <DCSection id="mobile" title="Mobil">
      <DCArtboard id="m1" label="Mobil · İlan Detay" width={395} height={832}>
        <div className="v-mobile-frame"><div><VariantMobile /></div></div>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
